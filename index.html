<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 금융 예측기 | 고수익 자산 관리</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body>
    <div class="container">
        <h1> AI 미래 자산 예측기</h1>
        <p>현재 자산과 저축 습관을 입력하면 AI가 1년 뒤를 예측합니다.</p>
        <input type="number" id="assets" placeholder="현재 자산(만원)">
        <input type="number" id="savings" placeholder="월 저축액(만원)">
        <button onclick="runAI()">AI 분석 실행</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
